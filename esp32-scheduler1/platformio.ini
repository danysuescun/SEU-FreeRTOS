; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32doit-devkit-v1

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = espidf
monitor_speed = 115200

build_flags =
    -Wl,-u,_printf_float
    -Wl,-u,_scanf_float
    -D CONFIG_FREERTOS_GENERATE_RUN_TIME_STATS=1
    -D CONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS=1
    -D CONFIG_FREERTOS_USE_TRACE_FACILITY=1
    -D CONFIG_FREERTOS_USE_TIME_SLICING=1
    -D CONFIG_FREERTOS_USE_PREEMPTION=0
    -D CONFIG_FREERTOS_UNICORE=1
    -D INCLUDE_vTaskDelayUntil=1

[env:lolin_d32]
platform = espressif32
board = lolin_d32
framework = espidf
monitor_speed = 115200

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200